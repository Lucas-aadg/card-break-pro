<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>Card Break Pro — Join as Breaker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --bg: #0d0d14;
      --card: #13131e;
      --border: #2d2d3d;
      --primary: #4f6ef7;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--text);
    }
    .brand h1 span { color: var(--primary); }
    .brand p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.4rem;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .form-group {
      margin-bottom: 1.1rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--primary); }
    input.invite-input {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    .btn {
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--red);
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .success-box {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px;
      color: var(--green);
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .org-badge {
      background: rgba(79,110,247,0.1);
      border: 1px solid rgba(79,110,247,0.3);
      border-radius: 8px;
      color: var(--primary);
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
      font-weight: 600;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .links {
      margin-top: 1.5rem;
      text-align: center;
    }
    .links a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.875rem;
    }
    .links a:hover { text-decoration: underline; }
    .spacer { margin-top: 1.5rem; }
    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>CARD <span>BREAK</span> PRO</h1>
      <p>Join Your Team</p>
    </div>

    <div id="errorBox" class="error-box"></div>
    <div id="successBox" class="success-box"></div>

    <form id="joinForm">
      <div class="section-title">Invite Code</div>

      <div class="form-group">
        <label for="inviteCode">Invite Code</label>
        <input
          type="text"
          id="inviteCode"
          class="invite-input"
          placeholder="XXXXXX"
          required
          maxlength="32"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="hint">Enter the invite code your business owner gave you.</p>
      </div>

      <div id="orgBadge" class="org-badge"></div>

      <div class="spacer"></div>
      <div class="section-title">Your Role</div>

      <div class="form-group">
        <label>I am joining as a</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:0.25rem;">
          <label style="all:unset;cursor:pointer;">
            <input type="radio" name="role" value="breaker" id="roleBreaker" required style="display:none;" />
            <div class="role-option" id="roleBreakerCard" onclick="selectRole('breaker')" style="border:2px solid var(--border);border-radius:8px;padding:0.9rem;text-align:center;transition:border-color 0.2s,background 0.2s;">
              <div style="font-size:1.3rem;margin-bottom:0.3rem;">🎴</div>
              <div style="font-weight:700;font-size:0.88rem;">Breaker</div>
              <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem;">I run live breaks</div>
            </div>
          </label>
          <label style="all:unset;cursor:pointer;">
            <input type="radio" name="role" value="sorter" id="roleSorter" style="display:none;" />
            <div class="role-option" id="roleSorterCard" onclick="selectRole('sorter')" style="border:2px solid var(--border);border-radius:8px;padding:0.9rem;text-align:center;transition:border-color 0.2s,background 0.2s;">
              <div style="font-size:1.3rem;margin-bottom:0.3rem;">📦</div>
              <div style="font-weight:700;font-size:0.88rem;">Sorter</div>
              <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem;">I sort & ship cards</div>
            </div>
          </label>
          <label style="all:unset;cursor:pointer;">
            <input type="radio" name="role" value="manager" id="roleManager" style="display:none;" />
            <div class="role-option" id="roleManagerCard" onclick="selectRole('manager')" style="border:2px solid var(--border);border-radius:8px;padding:0.9rem;text-align:center;transition:border-color 0.2s,background 0.2s;">
              <div style="font-size:1.3rem;margin-bottom:0.3rem;">🗂️</div>
              <div style="font-weight:700;font-size:0.88rem;">Manager</div>
              <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem;">I manage the team</div>
            </div>
          </label>
        </div>
      </div>

      <div class="spacer"></div>
      <div class="section-title">Your Info</div>

      <div class="form-group">
        <label for="displayName">Your Name</label>
        <input type="text" id="displayName" placeholder="e.g. Jake" required />
      </div>

      <div class="section-title" style="margin-top:1.2rem;">Account Credentials</div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 8 characters" required autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password" />
      </div>

      <button type="submit" id="joinBtn" class="btn btn-primary">Join Team</button>
    </form>

    <hr class="divider" />

    <div class="links">
      <a href="index.html">Already have an account? Sign in</a>
    </div>
  </div>

  <script>
    'use strict';

    const { createClient } = supabase;
    const sb = createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);

    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const orgBadge = document.getElementById('orgBadge');
    const joinBtn = document.getElementById('joinBtn');
    const joinForm = document.getElementById('joinForm');
    const inviteCodeInput = document.getElementById('inviteCode');

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      successBox.style.display = 'none';
    }

    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.style.display = 'block';
      errorBox.style.display = 'none';
    }

    function hideMessages() {
      errorBox.style.display = 'none';
      successBox.style.display = 'none';
    }

    // Live code lookup as user types
    let lookupTimer = null;
    inviteCodeInput.addEventListener('input', function () {
      const code = inviteCodeInput.value.trim().toUpperCase();
      inviteCodeInput.value = code;

      orgBadge.style.display = 'none';

      clearTimeout(lookupTimer);
      if (code.length < 4) return;

      lookupTimer = setTimeout(async function () {
        try {
          const { data, error } = await sb
            .from('invite_codes')
            .select('org_id, used')
            .eq('code', code)
            .single();

          if (error || !data) return;
          if (data.used) {
            orgBadge.textContent = 'This code has already been used.';
            orgBadge.style.color = 'var(--red)';
            orgBadge.style.borderColor = 'rgba(239,68,68,0.3)';
            orgBadge.style.background = 'rgba(239,68,68,0.1)';
            orgBadge.style.display = 'block';
            return;
          }

          // Separate query for org name — more reliable than join
          const { data: orgData } = await sb
            .from('organizations')
            .select('name')
            .eq('id', data.org_id)
            .single();

          const orgName = orgData ? orgData.name : 'your team';
          orgBadge.textContent = '✓ Joining: ' + escHtml(orgName);
          orgBadge.style.color = 'var(--primary)';
          orgBadge.style.borderColor = 'rgba(79,110,247,0.3)';
          orgBadge.style.background = 'rgba(79,110,247,0.1)';
          orgBadge.style.display = 'block';
        } catch (err) {
          // Silent — just don't show badge
        }
      }, 500);
    });

    function selectRole(role) {
      document.getElementById('roleBreaker').checked = (role === 'breaker');
      document.getElementById('roleSorter').checked = (role === 'sorter');
      document.getElementById('roleManager').checked = (role === 'manager');
      const bCard = document.getElementById('roleBreakerCard');
      const sCard = document.getElementById('roleSorterCard');
      const mCard = document.getElementById('roleManagerCard');
      [bCard, sCard, mCard].forEach(function(c) {
        c.style.borderColor = 'var(--border)';
        c.style.background = 'transparent';
      });
      const selected = { breaker: bCard, sorter: sCard, manager: mCard }[role];
      if (selected) {
        selected.style.borderColor = 'var(--primary)';
        selected.style.background = 'rgba(79,110,247,0.08)';
      }
    }

    joinForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideMessages();

      const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();
      const displayName = document.getElementById('displayName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const roleEl = document.querySelector('input[name="role"]:checked');
      const role = roleEl ? roleEl.value : null;

      if (!inviteCode || !displayName || !email || !password || !confirmPassword) {
        showError('All fields are required.');
        return;
      }

      if (!role) {
        showError('Please select your role — Breaker, Sorter, or Manager.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      joinBtn.disabled = true;
      joinBtn.textContent = 'Joining…';

      try {
        // Step 1: Look up the invite code
        const { data: codeData, error: codeError } = await sb
          .from('invite_codes')
          .select('id, org_id, used')
          .eq('code', inviteCode)
          .single();

        if (codeError || !codeData) {
          showError('Invalid invite code. Please check and try again.');
          return;
        }

        if (codeData.used) {
          showError('This invite code has already been used.');
          return;
        }

        const orgId = codeData.org_id;
        const codeId = codeData.id;

        // Step 2: Create auth user
        const { data: authData, error: authError } = await sb.auth.signUp({
          email,
          password
        });

        if (authError) {
          showError(escHtml(authError.message));
          return;
        }

        if (!authData.user) {
          showError('Registration failed. Please try again.');
          return;
        }

        const userId = authData.user.id;

        // Step 3: Create profile with selected role
        const { error: profileError } = await sb
          .from('profiles')
          .insert({
            id: userId,
            org_id: orgId,
            role: role,
            display_name: displayName
          });

        if (profileError) {
          showError('Failed to create profile: ' + escHtml(profileError.message));
          return;
        }

        // Step 4: Mark invite code as used
        const { error: updateError } = await sb
          .from('invite_codes')
          .update({ used: true })
          .eq('id', codeId);

        if (updateError) {
          console.warn('Failed to mark invite code as used:', updateError);
          // Non-fatal — continue
        }

        showSuccess('Welcome to the team! Redirecting…');

        setTimeout(function () {
          window.location.href = role === 'manager' ? 'manager.html' : role === 'sorter' ? 'sorter.html' : 'breaker.html';
        }, 1200);

      } catch (err) {
        showError('An unexpected error occurred. Please try again.');
        console.error('Join error:', err);
      } finally {
        joinBtn.disabled = false;
        joinBtn.textContent = 'Join Team';
      }
    });
  </script>
</body>
</html>
