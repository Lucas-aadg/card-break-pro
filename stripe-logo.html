<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Card Break Pro — Stripe Logo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060608;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    .logo-card {
      width: 600px;
      height: 200px;
      background: #0d0d14;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
    }

    /* Glow */
    .glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 500px; height: 300px;
      background: radial-gradient(ellipse at center, rgba(79,110,247,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Grid texture */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,110,247,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #4f6ef7 0%, #a855f7 100%);
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 1.75rem;
    }

    /* Icon box */
    .icon-box {
      width: 64px;
      height: 64px;
      background: rgba(79,110,247,0.12);
      border: 1px solid rgba(79,110,247,0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      box-shadow: 0 0 30px rgba(79,110,247,0.2);
    }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .brand {
      font-size: 1.9rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: #e2e8f0;
      text-transform: uppercase;
      line-height: 1;
    }
    .brand span { color: #4f6ef7; }

    .tagline {
      font-size: 0.78rem;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider-v {
      width: 1px;
      height: 60px;
      background: #2d2d3d;
      flex-shrink: 0;
    }

    .right-block {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }
    .pill .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pill .dot.blue { background: #4f6ef7; }
    .pill .dot.green { background: #22c55e; }
    .pill .dot.purple { background: #a855f7; }
  </style>
</head>
<body>
  <div class="logo-card">
    <div class="glow"></div>
    <div class="grid"></div>
    <div class="accent-bar"></div>

    <div class="content">
      <div class="icon-box">🎴</div>

      <div class="text-block">
        <div class="brand">CARD <span>BREAK</span> PRO</div>
        <div class="tagline">The Business OS for Live Card Breakers</div>
      </div>

      <div class="divider-v"></div>

      <div class="right-block">
        <div class="pill"><div class="dot blue"></div> Break Tracking & Analytics</div>
        <div class="pill"><div class="dot green"></div> Auto Commissions & Payouts</div>
        <div class="pill"><div class="dot purple"></div> Sort Queue & Shipping</div>
      </div>
    </div>
  </div>
</body>
</html>
